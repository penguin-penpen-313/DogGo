<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>対戦表示 | お絵描き対決</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="firebase-config.js"></script>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
      background: #08081a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 10px 28px;
      background: #101025;
      border-bottom: 2px solid #4a9eff;
      flex-shrink: 0;
    }
    .game-title { font-size: 1.1rem; font-weight: bold; color: #4a9eff; letter-spacing: 0.05em; }
    .topic-indicator { color: #888; font-size: 0.9rem; text-align: right; }
    .header-scores { display: flex; gap: 32px; justify-content: center; }
    .hs-a, .hs-b {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 28px;
      border-radius: 10px;
    }
    .hs-a { border: 2px solid #4a9eff; }
    .hs-b { border: 2px solid #ff4a4a; }
    .hs-a .hlabel { color: #4a9eff; font-size: 0.75rem; font-weight: bold; }
    .hs-b .hlabel { color: #ff4a4a; font-size: 0.75rem; font-weight: bold; }
    .hs-a .hpts, .hs-b .hpts { font-size: 2rem; font-weight: bold; line-height: 1.1; }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }
    .phase-screen { display: none; width: 100%; max-width: 720px; }
    .phase-screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Phase labels */
    .phase-title {
      font-size: 2.2rem;
      font-weight: bold;
      letter-spacing: 0.04em;
    }
    .phase-sub { color: #888; font-size: 1rem; }

    /* Timer */
    .timer-huge {
      font-size: 6rem;
      font-weight: bold;
      color: #4aff8a;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .timer-huge.urgent { color: #ff4a4a; animation: blink 0.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .timer-label-sm { color: #888; font-size: 0.9rem; }

    /* Countdown */
    #disp-countdown {
      font-size: 12rem;
      font-weight: bold;
      color: #4a9eff;
      animation: pop 0.7s ease-out;
    }
    @keyframes pop { 0%{transform:scale(2);opacity:0} 100%{transform:scale(1);opacity:1} }

    /* Canvas */
    #disp-canvas {
      image-rendering: pixelated;
      border: 3px solid #4a9eff;
      border-radius: 4px;
      max-width: min(60vw, 60vh);
      width: 100%;
      height: auto;
    }

    /* Answers */
    .reveal-answers {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }
    .reveal-card {
      flex: 1;
      min-width: 200px;
      max-width: 280px;
      background: #101025;
      border: 2px solid #333;
      border-radius: 14px;
      padding: 20px 24px;
      text-align: center;
    }
    .reveal-card.winner { border-color: #4aff8a; box-shadow: 0 0 20px #4aff8a44; }
    .reveal-card .rc-label { font-size: 0.8rem; margin-bottom: 8px; }
    .reveal-card.a .rc-label { color: #4a9eff; }
    .reveal-card.b .rc-label { color: #ff4a4a; }
    .reveal-card .rc-answer { font-size: 1.8rem; font-weight: bold; }
    .reveal-card.winner .rc-answer { color: #4aff8a; }
    .reveal-card:not(.winner) .rc-answer { color: #ff6666; }
    .reveal-card .rc-text { font-size: 1.1rem; color: #ccc; margin-top: 6px; word-break: break-all; }
    .topic-reveal-disp {
      background: #1a1a35;
      border-radius: 12px;
      padding: 14px 32px;
      text-align: center;
      font-size: 1rem;
      color: #888;
    }
    .topic-reveal-disp span { color: #fff; font-size: 2rem; font-weight: bold; }
    .result-msg { font-size: 1.1rem; color: #ffd700; }

    /* Winner screen */
    .winner-huge {
      border: 4px solid #ffd700;
      border-radius: 20px;
      padding: 40px 60px;
      text-align: center;
      background: linear-gradient(135deg, #1a1a35, #0f0f1a);
    }
    .winner-huge .wl { color: #ffd700; font-size: 1rem; margin-bottom: 10px; letter-spacing: 0.1em; }
    .winner-huge .wn { font-size: 4rem; font-weight: bold; }
    .final-scores { display: flex; gap: 30px; }
    .fs-card {
      text-align: center;
      padding: 20px 36px;
      border-radius: 14px;
      border: 2px solid;
    }
    .fs-card.a { border-color: #4a9eff; }
    .fs-card.b { border-color: #ff4a4a; }
    .fs-card .fsl { font-size: 0.85rem; margin-bottom: 6px; }
    .fs-card.a .fsl { color: #4a9eff; }
    .fs-card.b .fsl { color: #ff4a4a; }
    .fs-card .fsn { font-size: 2.6rem; font-weight: bold; }

    /* QR code panel (always visible corner) */
    #qr-panel {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #qr-panel canvas { border-radius: 4px; }
    #qr-label {
      font-size: 0.6rem;
      color: #333;
      text-align: center;
      font-weight: bold;
      max-width: 100px;
      word-break: break-all;
    }
    #qr-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #222;
      border: 1px solid #555;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
      display: none;
    }

    /* Drawing status indicator */
    .drawing-info {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .dot-anim {
      width: 12px; height: 12px;
      background: #4aff8a;
      border-radius: 50%;
      animation: dotpulse 1s infinite;
    }
    @keyframes dotpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }

    /* Retry indicator */
    .round-badge {
      background: #ff8800;
      color: #fff;
      font-size: 0.8rem;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 20px;
    }
  </style>
</head>
<body>

<div id="header">
  <div class="game-title">🎨 お絵描き対決</div>
  <span class="topic-indicator" id="topic-ind">準備中</span>
  <div class="header-scores">
    <div class="hs-a"><span class="hlabel">対決者A</span><span class="hpts" id="h-score-a">0点</span></div>
    <div class="hs-b"><span class="hlabel">対決者B</span><span class="hpts" id="h-score-b">0点</span></div>
  </div>
</div>

<div id="main">

  <!-- WAITING -->
  <div id="phase-waiting" class="phase-screen">
    <div class="phase-title" style="color:#4a9eff">🎮 ゲーム開始待ち</div>
    <div class="phase-sub">参加者は右下のQRコードからアクセスしてください</div>
    <div style="font-size:1rem;color:#555;">ゲームが開始されるまでお待ちください</div>
  </div>

  <!-- PREPARING -->
  <div id="phase-preparing" class="phase-screen">
    <div class="phase-title" style="color:#ffcc00">🎨 準備してください！</div>
    <div id="disp-prepare-countdown" style="font-size:8rem;font-weight:bold;color:#fff;line-height:1;">3</div>
    <div class="timer-label-sm">秒後にお絵描き開始</div>
  </div>

  <!-- DRAWING -->
  <div id="phase-drawing" class="phase-screen">
    <div class="drawing-info">
      <div class="dot-anim"></div>
      <div class="phase-title" style="color:#4aff8a">🖊️ お絵描き回答中</div>
    </div>
    <div id="round-badge-disp" class="round-badge" style="display:none"></div>
    <div class="timer-huge" id="disp-drawing-timer">60</div>
    <div class="timer-label-sm">秒</div>
  </div>

  <!-- DRAWING ENDED -->
  <div id="phase-drawing-ended" class="phase-screen">
    <div class="phase-title" style="color:#ffcc00">⏹️ 回答終了</div>
    <div class="phase-sub">対決者が回答を開始します</div>
  </div>

  <!-- COUNTDOWN -->
  <div id="phase-countdown" class="phase-screen">
    <div class="phase-sub" style="font-size:1.2rem">イラスト公開まで...</div>
    <div id="disp-countdown">3</div>
  </div>

  <!-- ANSWERING -->
  <div id="phase-answering" class="phase-screen">
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="timer-label-sm">残り</span>
      <div class="timer-huge" id="disp-answer-timer">30</div>
      <span class="timer-label-sm">秒</span>
    </div>
    <canvas id="disp-canvas"></canvas>
    <div class="phase-sub">対決者が答えを考えています...</div>
    <div id="disp-pts-info" style="font-size:1.1rem;color:#ffd700;margin-top:4px;"></div>
  </div>

  <!-- ANSWER REVEAL -->
  <div id="phase-answer-reveal" class="phase-screen">
    <div class="reveal-answers">
      <div class="reveal-card a" id="disp-card-a">
        <div class="rc-label">対決者A</div>
        <div class="rc-answer" id="disp-ans-mark-a"></div>
        <div class="rc-text" id="disp-ans-a"></div>
      </div>
      <div class="reveal-card b" id="disp-card-b">
        <div class="rc-label">対決者B</div>
        <div class="rc-answer" id="disp-ans-mark-b"></div>
        <div class="rc-text" id="disp-ans-b"></div>
      </div>
    </div>
    <div class="result-msg" id="disp-result-msg"></div>
  </div>

  <!-- GAME OVER -->
  <div id="phase-game-over" class="phase-screen">
    <div style="font-size:3rem">🏆</div>
    <div class="winner-huge" id="disp-winner"></div>
    <div class="final-scores">
      <div class="fs-card a"><div class="fsl" id="disp-label-a">対決者A</div><div class="fsn" id="disp-final-a">0点</div></div>
      <div class="fs-card b"><div class="fsl" id="disp-label-b">対決者B</div><div class="fsn" id="disp-final-b">0点</div></div>
    </div>
    <div style="margin-top:20px;font-size:1rem;color:#888;">📖 感想戦</div>
    <div id="game-history" style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:12px;max-width:900px;"></div>
  </div>

</div>

<!-- QR Panel -->
<div id="qr-panel">
  <div id="qr-canvas"></div>
  <div id="qr-label">参加者はこちら</div>
</div>

<script>
// ── QR Code generation ─────────────────────────────────
window.addEventListener('load', () => {
  const url = window.location.href.replace(/display\.html.*$/, 'participant.html');
  const container = document.getElementById('qr-canvas');
  container.innerHTML = '';
  new QRCode(container, {
    text: url,
    width: 110,
    height: 110,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
});

// ── State ──────────────────────────────────────────────
let gameState = null;
let timerInterval = null;

// ── Firebase Listener ──────────────────────────────────
db.collection('game').doc('session').onSnapshot(doc => {
  if (!doc.exists) { showPhase('waiting'); return; }
  gameState = doc.data();
  updateHeader();
  applyPhase(gameState.phase);
});

function applyPhase(phase) {
  switch (phase) {
    case 'waiting':
      showPhase('waiting');
      stopTimers();
      break;
    case 'preparing':
      showPhase('preparing');
      stopTimers();
      syncPrepareTimer();
      break;
    case 'drawing':
      showPhase('drawing');
      updateRoundBadge();
      runDrawingTimer();
      break;
    case 'drawing_ended':
      showPhase('drawing-ended');
      stopTimers();
      break;
    case 'countdown':
      showPhase('countdown');
      renderComposite();
      syncCountdown();
      break;
    case 'answering':
      showPhase('answering');
      renderComposite();
      runAnswerTimer();
      // 正解した場合の得点を表示
      (function() {
        const n = gameState.participantCount || 0;
        const m = gameState.round || 1;
        const pts = Math.max(1, n - m + 1);
        const el = document.getElementById('disp-pts-info');
        if (el) el.textContent = `🏅 正解した場合の得点：${pts}点（参加者${n}人 / ${m}回目）`;
      })();
      break;
    case 'answer_reveal':
      showPhase('answer-reveal');
      stopTimers();
      displayReveal();
      break;
    case 'game_over':
      showPhase('game-over');
      stopTimers();
      displayGameOver();
      break;
    default:
      showPhase('waiting');
  }
}

function showPhase(id) {
  document.querySelectorAll('.phase-screen').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('phase-' + id);
  if (el) el.classList.add('active');
}

function isCorrect(answer, topic) {
  const ans = (answer || '').trim();
  if (!ans || !topic) return false;
  return topic.split(',').map(t => t.trim()).includes(ans);
}

function updateHeader() {
  if (!gameState) return;
  const n = gameState.topicNumber || 0;
  const r = gameState.round || 1;
  let topicText = n > 0 ? `お題 ${n} / ${CONFIG.totalTopics}` : '準備中';
  if (n > 0 && r > 1) topicText += `（${r}回目）`;
  document.getElementById('topic-ind').textContent = topicText;
  document.getElementById('h-score-a').textContent = `${gameState.playerAScore || 0}点`;
  document.getElementById('h-score-b').textContent = `${gameState.playerBScore || 0}点`;
  // プレイヤー名をヘッダーに反映
  const labA = document.querySelector('.hs-a .hlabel');
  const labB = document.querySelector('.hs-b .hlabel');
  if (labA) labA.textContent = CONFIG.playerAName;
  if (labB) labB.textContent = CONFIG.playerBName;
}

function updateRoundBadge() {
  if (!gameState) return;
  const r = gameState.round || 1;
  const badge = document.getElementById('round-badge-disp');
  if (r > 1) {
    badge.textContent = `${r}周目`;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

function stopTimers() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function runDrawingTimer() {
  stopTimers();
  const tick = () => {
    if (!gameState || gameState.phase !== 'drawing') return;
    const rem = Math.ceil((gameState.drawingEndTime - Date.now()) / 1000);
    const el = document.getElementById('disp-drawing-timer');
    if (el) { el.textContent = Math.max(0, rem); el.classList.toggle('urgent', rem <= 10); }
  };
  tick();
  timerInterval = setInterval(tick, 200);
}

function syncPrepareTimer() {
  stopTimers();
  timerInterval = setInterval(() => {
    if (!gameState || gameState.phase !== 'preparing') { stopTimers(); return; }
    const startedAt = gameState.prepareStartedAt || Date.now();
    const elapsed = Math.floor((Date.now() - startedAt) / 1000);
    const rem = Math.max(0, CONFIG.prepareTime - elapsed);
    const el = document.getElementById('disp-prepare-countdown');
    if (el) el.textContent = rem;
  }, 100);
}

function syncCountdown() {
  stopTimers();
  timerInterval = setInterval(() => {
    if (!gameState || gameState.phase !== 'countdown') { stopTimers(); return; }
    const startedAt = gameState.countdownStartedAt || Date.now();
    const elapsed = Math.floor((Date.now() - startedAt) / 1000);
    const rem = Math.max(0, CONFIG.countdownSeconds - elapsed);
    const el = document.getElementById('disp-countdown');
    if (el) el.textContent = rem;
  }, 100);
}

function runAnswerTimer() {
  stopTimers();
  const tick = () => {
    if (!gameState || gameState.phase !== 'answering') return;
    const rem = Math.ceil((gameState.answerEndTime - Date.now()) / 1000);
    const el = document.getElementById('disp-answer-timer');
    if (el) { el.textContent = Math.max(0, rem); el.classList.toggle('urgent', rem <= 10); }
  };
  tick();
  timerInterval = setInterval(tick, 200);
}

function renderComposite() {
  if (!gameState) return;
  const canvas = document.getElementById('disp-canvas');
  const size = CONFIG.canvasSize;
  const scale = CONFIG.displayScale;
  canvas.width = size * scale;
  canvas.height = size * scale;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const grey = gameState.greyPixels || '';
  const comp = gameState.compositePixels || '';
  for (let i = 0; i < size * size; i++) {
    const x = (i % size) * scale, y = Math.floor(i / size) * scale;
    if (grey[i] === '1') { ctx.fillStyle = '#ccc'; ctx.fillRect(x, y, scale, scale); }
  }
  for (let i = 0; i < size * size; i++) {
    const x = (i % size) * scale, y = Math.floor(i / size) * scale;
    if (comp[i] === '1') { ctx.fillStyle = '#111'; ctx.fillRect(x, y, scale, scale); }
  }
}

function displayReveal() {
  if (!gameState) return;
  const topic = gameState.currentTopic;
  const ansA = gameState.playerAAnswer || '（未回答）';
  const ansB = gameState.playerBAnswer || '（未回答）';
  const aOk = isCorrect(ansA, topic), bOk = isCorrect(ansB, topic);

  document.getElementById('disp-ans-mark-a').textContent = aOk ? '⭕' : '❌';
  document.getElementById('disp-ans-mark-b').textContent = bOk ? '⭕' : '❌';
  document.getElementById('disp-ans-a').textContent = ansA;
  document.getElementById('disp-ans-b').textContent = ansB;

  const cardA = document.getElementById('disp-card-a');
  const cardB = document.getElementById('disp-card-b');
  cardA.className = 'reveal-card a' + (aOk ? ' winner' : '');
  cardB.className = 'reveal-card b' + (bOk ? ' winner' : '');

  const msg = document.getElementById('disp-result-msg');
  const nameA = CONFIG.playerAName, nameB = CONFIG.playerBName;
  const round = gameState.round || 1;
  const maxRoundsReached = round >= (CONFIG.maxRounds || 5);
  if (aOk && bOk) msg.textContent = `🎉 ${nameA}と${nameB}が正解しました！`;
  else if (aOk) msg.textContent = `🎉 ${nameA}が正解しました！`;
  else if (bOk) msg.textContent = `🎉 ${nameB}が正解しました！`;
  else if (maxRoundsReached) msg.textContent = '😢 チャレンジ上限に達しました…';
  else msg.textContent = '😢 正解者はいませんでした！';
}

function displayGameOver() {
  if (!gameState) return;
  const sA = gameState.playerAScore || 0, sB = gameState.playerBScore || 0;
  document.getElementById('disp-final-a').textContent = `${sA}点`;
  document.getElementById('disp-final-b').textContent = `${sB}点`;
  document.getElementById('disp-label-a').textContent = CONFIG.playerAName;
  document.getElementById('disp-label-b').textContent = CONFIG.playerBName;
  const box = document.getElementById('disp-winner');
  const w = gameState.winner;
  if (w === 'draw') {
    box.innerHTML = '<div class="wl">結果</div><div class="wn">🤝 引き分け！</div>';
  } else {
    const col = w === 'A' ? '#4a9eff' : '#ff4a4a';
    const name = w === 'A' ? CONFIG.playerAName : CONFIG.playerBName;
    box.innerHTML = `<div class="wl">🏆 優勝</div><div class="wn" style="color:${col}">${name}</div>`;
  }

  // 感想戦
  const history = gameState.gameHistory || [];
  const container = document.getElementById('game-history');
  container.innerHTML = '';
  history.forEach((item, idx) => {
    const topicLabel = (item.topic || '').split(',')[0];
    const div = document.createElement('div');
    div.style.cssText = 'text-align:center;';
    const cvs = document.createElement('canvas');
    const size = CONFIG.canvasSize, scale = 8;
    cvs.width = size * scale; cvs.height = size * scale;
    cvs.style.cssText = 'display:block;image-rendering:pixelated;border:1px solid #333;border-radius:4px;';
    const ctx = cvs.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, cvs.width, cvs.height);
    const comp = item.composite || '';
    for (let i = 0; i < size * size; i++) {
      if (comp[i] === '1') {
        const x = (i % size) * scale, y = Math.floor(i / size) * scale;
        ctx.fillStyle = '#111'; ctx.fillRect(x, y, scale, scale);
      }
    }
    const label = document.createElement('div');
    label.style.cssText = 'font-size:0.9rem;color:#aaa;margin-top:6px;';
    label.textContent = `${idx + 1}. ${topicLabel}`;
    div.appendChild(cvs);
    div.appendChild(label);
    container.appendChild(div);
  });
}
</script>
</body>
</html>
