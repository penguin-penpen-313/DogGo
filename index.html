<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お絵描き対決ゲーム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen Maru Gothic:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', 'BIZ UDPGothic', sans-serif;
    padding: 2rem;
    overflow: hidden;
    position: relative;
  }

  /* 背景のドット */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #ffffff18 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  /* 背景のカラーブロブ */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    pointer-events: none;
  }
  .blob-1 { width: 400px; height: 400px; background: #e040fb; top: -100px; left: -100px; }
  .blob-2 { width: 350px; height: 350px; background: #00bcd4; bottom: -80px; right: -80px; }
  .blob-3 { width: 250px; height: 250px; background: #ffeb3b; top: 40%; left: 60%; }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 480px;
    width: 100%;
  }

  .emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 0.5rem;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  h1 {
    font-size: 2rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
    text-shadow: 0 2px 20px rgba(224,64,251,0.5);
  }

  .subtitle {
    font-size: 0.85rem;
    color: #ffffffaa;
    margin-bottom: 2.5rem;
    letter-spacing: 0.08em;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.4rem;
    border-radius: 16px;
    text-decoration: none;
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.04em;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .card:hover::before { opacity: 1; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .card:active { transform: translateY(0); }

  .card-a  { background: linear-gradient(135deg, #e040fb, #ab47bc); box-shadow: 0 4px 20px rgba(224,64,251,0.3); }
  .card-b  { background: linear-gradient(135deg, #42a5f5, #1565c0); box-shadow: 0 4px 20px rgba(66,165,245,0.3); }
  .card-d  { background: linear-gradient(135deg, #26c6da, #00838f); box-shadow: 0 4px 20px rgba(38,198,218,0.3); }
  .card-p  { background: linear-gradient(135deg, #66bb6a, #2e7d32); box-shadow: 0 4px 20px rgba(102,187,106,0.3); }

  .card-icon { font-size: 1.6rem; flex-shrink: 0; }
  .card-text { text-align: left; }
  .card-label { font-size: 0.72rem; font-weight: 400; opacity: 0.8; display: block; margin-bottom: 1px; }
  .card-title { display: block; }

  .arrow {
    margin-left: auto;
    font-size: 1rem;
    opacity: 0.6;
  }

  .footer {
    margin-top: 2.2rem;
    font-size: 0.72rem;
    color: #ffffff55;
    letter-spacing: 0.05em;
  }

  .btn-reset {
    margin-top: 1.4rem;
    width: 100%;
    padding: 0.75rem 1.4rem;
    border-radius: 12px;
    border: 1.5px solid #ff525288;
    background: transparent;
    color: #ff5252aa;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .btn-reset:hover { background: #ff525218; color: #ff5252; border-color: #ff5252; }
  .btn-reset:active { transform: scale(0.98); }
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="config.js"></script>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">
    <span class="emoji">🎨</span>
    <h1>お絵描き対決</h1>
    <p class="subtitle">みんなで描いて、ふたりで当てろ！</p>

    <div class="cards">
      <a href="player-a.html" class="card card-a">
        <span class="card-icon">👑</span>
        <span class="card-text">
          <span class="card-label">① 対決者</span>
          <span class="card-title">対決者 A（進行役）</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a href="player-b.html" class="card card-b">
        <span class="card-icon">🎯</span>
        <span class="card-text">
          <span class="card-label">① 対決者</span>
          <span class="card-title">対決者 B</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a href="display.html" class="card card-d">
        <span class="card-icon">📺</span>
        <span class="card-text">
          <span class="card-label">② 表示画面</span>
          <span class="card-title">大画面・プロジェクター用</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a href="participant.html" class="card card-p">
        <span class="card-icon">✏️</span>
        <span class="card-text">
          <span class="card-label">③ 参加者</span>
          <span class="card-title">お絵描き画面（スマホ）</span>
        </span>
        <span class="arrow">›</span>
      </a>
    </div>

    <p class="footer">② の QRコードから参加者は ③ にアクセスできます</p>
    <button class="btn-reset" onclick="resetGame()">🔄 ゲームをリセット</button>
  </div>

<script>
async function resetGame() {
  if (!confirm('ゲームをリセットしますか？\nFirestoreのデータがすべて初期化されます。')) return;
  const px = CONFIG.canvasSize * CONFIG.canvasSize;
  try {
    // 参加者データを削除
    const snap = await db.collection('participants').get();
    if (!snap.empty) {
      const batch = db.batch();
      snap.forEach(d => batch.delete(d.ref));
      await batch.commit();
    }
    // ゲーム状態を初期化
    await db.collection('game').doc('session').set({
      phase: 'waiting',
      topicNumber: 0,
      round: 1,
      currentTopic: '',
      compositePixels: '0'.repeat(px),
      greyPixels: '0'.repeat(px),
      drawingEndTime: null,
      answerEndTime: null,
      playerAAnswer: '',
      playerBAnswer: '',
      playerASubmitted: false,
      playerBSubmitted: false,
      playerAScore: 0,
      playerBScore: 0,
      usedTopics: [],
      topicsList: [],
      winner: null,
      lastResult: null,
      gameHistory: [],
    });
    alert('✅ リセット完了しました');
  } catch (e) {
    alert('❌ リセットに失敗しました\n' + e.message);
  }
}
</script>
</body>
</html>
