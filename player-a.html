<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>対決者A | お絵描き対決</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #status-bar {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #161628;
      border-bottom: 2px solid #4a9eff;
    }
    .player-badge {
      background: #4a9eff;
      color: #fff;
      font-weight: bold;
      font-size: 0.85rem;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .score-wrap { display: flex; gap: 16px; }
    .score-a { color: #4a9eff; font-weight: bold; }
    .score-b { color: #ff4a4a; font-weight: bold; }
    .topic-num { color: #888; font-size: 0.85rem; }
    #main {
      width: 100%;
      max-width: 600px;
      padding: 24px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }
    .phase-screen { display: none; width: 100%; }
    .phase-screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .phase-title { font-size: 1.6rem; font-weight: bold; color: #4a9eff; }
    .phase-sub { color: #888; font-size: 0.95rem; text-align: center; line-height: 1.6; }

    /* Buttons */
    .btn-primary {
      background: #4a9eff;
      color: #fff;
      border: none;
      padding: 14px 36px;
      font-size: 1.15rem;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: #2a7edf; transform: scale(1.03); }
    .btn-primary:disabled { background: #3a3a4a; color: #666; cursor: not-allowed; transform: none; }
    .btn-danger {
      background: #ff4a4a;
      color: #fff;
      border: none;
      padding: 14px 36px;
      font-size: 1.15rem;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
    }
    .btn-danger:hover { background: #cc2a2a; }
    .btn-secondary {
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      padding: 10px 24px;
      font-size: 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-secondary:hover { border-color: #888; color: #fff; }

    /* Timer */
    .timer-big {
      font-size: 4rem;
      font-weight: bold;
      color: #4aff8a;
      line-height: 1;
    }
    .timer-big.urgent { color: #ff4a4a; animation: blink 0.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .timer-label { color: #888; font-size: 0.85rem; }

    /* Countdown */
    #countdown-number {
      font-size: 9rem;
      font-weight: bold;
      color: #4a9eff;
      animation: pop 0.6s ease-out;
    }
    @keyframes pop { 0%{transform:scale(1.8);opacity:0} 100%{transform:scale(1);opacity:1} }

    /* Canvas */
    #composite-canvas {
      border: 2px solid #4a9eff;
      image-rendering: pixelated;
      max-width: 280px;
      width: 100%;
      height: auto;
      border-radius: 4px;
    }

    /* Answer */
    .answer-box {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .answer-box label { color: #888; font-size: 0.9rem; }
    .answer-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1.3rem;
      border: 2px solid #4a9eff;
      border-radius: 8px;
      background: #161628;
      color: #fff;
      text-align: center;
      font-family: inherit;
    }
    .answer-input:focus { outline: none; border-color: #7abeff; }
    .answer-input:disabled { border-color: #333; opacity: 0.5; }
    .submit-status { font-size: 0.9rem; color: #4aff8a; min-height: 1.4em; }

    /* Reveal */
    .result-row {
      width: 100%;
      max-width: 380px;
      background: #161628;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 16px 20px;
    }
    .result-row.correct { border-color: #4aff8a; }
    .result-row .label { color: #888; font-size: 0.8rem; margin-bottom: 4px; }
    .result-row .answer-text { font-size: 1.4rem; font-weight: bold; }
    .correct-text { color: #4aff8a; }
    .wrong-text { color: #ff6666; }
    .topic-reveal-box {
      background: #1e1e35;
      border-radius: 10px;
      padding: 12px 24px;
      text-align: center;
      font-size: 0.9rem;
      color: #888;
    }
    .topic-reveal-box span { color: #fff; font-size: 1.4rem; font-weight: bold; }

    /* Winner */
    .winner-box {
      border: 3px solid #ffd700;
      border-radius: 16px;
      padding: 28px 40px;
      text-align: center;
      background: #1a1a2e;
    }
    .winner-box .wlabel { color: #ffd700; font-size: 0.85rem; margin-bottom: 6px; }
    .winner-box .wname { font-size: 2.4rem; font-weight: bold; }
    .score-final-wrap { display: flex; gap: 20px; }
    .score-final-card {
      text-align: center;
      padding: 16px 28px;
      border-radius: 12px;
      border: 2px solid;
    }
    .score-final-card.a { border-color: #4a9eff; }
    .score-final-card.b { border-color: #ff4a4a; }
    .score-final-card .slabel { font-size: 0.8rem; margin-bottom: 4px; }
    .score-final-card.a .slabel { color: #4a9eff; }
    .score-final-card.b .slabel { color: #ff4a4a; }
    .score-final-card .snum { font-size: 2rem; font-weight: bold; }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

    /* Small reset */
    #admin-btn {
      position: fixed;
      bottom: 14px;
      right: 14px;
      background: #222;
      color: #666;
      border: 1px solid #444;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.72rem;
      font-family: inherit;
    }
    #admin-btn:hover { color: #aaa; border-color: #666; }
  </style>
</head>
<body>

<div id="status-bar">
  <span class="player-badge">対決者 A</span>
  <span class="topic-num" id="topic-num-disp">準備中</span>
  <div class="score-wrap">
    <span class="score-a" id="score-a-disp">A: 0点</span>
    <span class="score-b" id="score-b-disp">B: 0点</span>
  </div>
</div>

<div id="main">

  <!-- INITIAL -->
  <div id="phase-initial" class="phase-screen">
    <div class="phase-title">🎮 お絵描き対決</div>
    <div class="phase-sub">対決者A の画面です<br>準備ができたらゲームを開始してください</div>
    <button class="btn-primary" onclick="initGame()">ゲーム開始</button>
  </div>

  <!-- WAITING -->
  <div id="phase-waiting" class="phase-screen">
    <div class="phase-title">🎯 準備完了</div>
    <div class="phase-sub">「次のお題」を押すと参加者にお題が表示されます<br>対決者はお題を見ることができません</div>
    <button class="btn-primary" id="btn-next-topic" onclick="nextTopic()">次のお題 →</button>
  </div>

  <!-- PREPARING -->
  <div id="phase-preparing" class="phase-screen">
    <div class="phase-title">🎨 準備してください！</div>
    <div class="timer-big" id="prepare-timer">3</div>
    <div class="timer-label">秒</div>
  </div>

  <!-- DRAWING -->
  <div id="phase-drawing" class="phase-screen">
    <div class="phase-title">🖊️ お絵描き中...</div>
    <div class="phase-sub">参加者がお題の絵を描いています<br>対決者はお題を知ることができません</div>
    <div class="timer-big" id="drawing-timer">60</div>
    <div class="timer-label">秒</div>
  </div>

  <!-- DRAWING ENDED -->
  <div id="phase-drawing-ended" class="phase-screen">
    <div class="phase-title">✅ 回答終了！</div>
    <div class="phase-sub">参加者の回答が揃いました<br>準備ができたら回答開始を押してください</div>
    <button class="btn-primary" onclick="startCountdown()">回答開始</button>
  </div>

  <!-- COUNTDOWN -->
  <div id="phase-countdown" class="phase-screen">
    <div class="phase-sub">イラスト公開まで...</div>
    <div id="countdown-number">3</div>
  </div>

  <!-- ANSWERING -->
  <div id="phase-answering" class="phase-screen">
    <canvas id="composite-canvas"></canvas>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="timer-label">残り</span>
      <div class="timer-big" id="answer-timer">30</div>
      <span class="timer-label">秒</span>
    </div>
    <div class="answer-box">
      <label>お題を推測して ひらがなで入力してください</label>
      <input type="text" id="player-a-input" class="answer-input"
             placeholder="ひらがなで入力..." maxlength="20">
      <button class="btn-primary" id="btn-submit-a" onclick="submitAnswerA()">決定</button>
      <div class="submit-status" id="submit-status-a"></div>
    </div>
  </div>

  <!-- ANSWER REVEAL -->
  <div id="phase-answer-reveal" class="phase-screen">
    <div class="topic-reveal-box" id="reveal-topic-box" style="display:none">お題：<span id="reveal-topic"></span></div>
    <canvas id="reveal-canvas" style="border:2px solid #333;image-rendering:pixelated;max-width:200px;width:100%;height:auto;border-radius:4px;margin-bottom:4px;"></canvas>
    <div class="result-row" id="result-row-a">
      <div class="label" id="label-a">対決者A の回答</div>
      <div class="answer-text" id="result-a"></div>
    </div>
    <div class="result-row" id="result-row-b">
      <div class="label" id="label-b">対決者B の回答</div>
      <div class="answer-text" id="result-b"></div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="btn-next-after-reveal" onclick="proceedAfterReveal()" style="display:none">次のお題 →</button>
      <button class="btn-danger" id="btn-retry" onclick="retryTopic()" style="display:none">もう一度 🔄</button>
      <button class="btn-primary" id="btn-gameover" onclick="goToGameOver()" style="display:none">結果発表 🏆</button>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="phase-game-over" class="phase-screen">
    <div style="font-size:2.5rem">🏆</div>
    <div class="winner-box" id="winner-box"></div>
    <div class="score-final-wrap">
      <div class="score-final-card a">
        <div class="slabel" id="final-label-a">対決者A</div>
        <div class="snum" id="final-a">0点</div>
      </div>
      <div class="score-final-card b">
        <div class="slabel" id="final-label-b">対決者B</div>
        <div class="snum" id="final-b">0点</div>
      </div>
    </div>
    <div style="margin-top:16px;font-size:0.9rem;color:#888;">📖 感想戦</div>
    <div id="game-history" style="width:100%;max-width:560px;display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:8px;"></div>
    <button class="btn-secondary" onclick="resetGame()" style="margin-top:16px;">もう一度プレイ</button>
  </div>

</div>

<button id="admin-btn" onclick="resetGame()">リセット</button>

<script>
// ── State ──────────────────────────────────────────────
let gameState = null;
let timerInterval = null;
let countdownInterval = null;
let playerASubmitted = false;
let topicsCache = null;

// ── Firebase Listener ──────────────────────────────────
// 10秒以内にonSnapshotが発火しなければエラー表示
const fbTimeout = setTimeout(() => {
  if (!gameState) {
    document.getElementById('main').innerHTML =
      '<div style="color:#ff6666;text-align:center;padding:20px;">⚠️ Firebaseに接続できません<br><small>firebase-config.jsの設定を確認してください</small></div>';
  }
}, 10000);

db.collection('game').doc('session').onSnapshot(doc => {
  clearTimeout(fbTimeout);
  if (!doc.exists) { showPhase('initial'); return; }
  gameState = doc.data();
  updateStatusBar();
  // リセット直後(topicNumber=0, phase=waiting)は初期画面を表示
  if (gameState.phase === 'waiting' && (gameState.topicNumber || 0) === 0) {
    showPhase('initial');
    stopTimers();
    return;
  }
  applyPhase(gameState.phase);
}, err => {
  clearTimeout(fbTimeout);
  console.error('Firestore error:', err);
  document.getElementById('main').innerHTML =
    `<div style="color:#ff6666;text-align:center;padding:20px;">⚠️ Firestoreエラー<br><small>${err.message}</small></div>`;
});

function applyPhase(phase) {
  console.log('[applyPhase]', phase, 'topicNumber:', gameState?.topicNumber);
  switch (phase) {
    case 'waiting':
      showPhase('waiting');
      stopTimers();
      playerASubmitted = false;
      break;
    case 'preparing':
      showPhase('preparing');
      stopTimers();
      syncPrepareTimer();
      break;
    case 'drawing':
      showPhase('drawing');
      runDrawingTimer();
      break;
    case 'drawing_ended':
      showPhase('drawing-ended');
      stopTimers();
      break;
    case 'countdown':
      showPhase('countdown');
      // countdown driven by startCountdown()
      break;
    case 'answering':
      showPhase('answering');
      renderComposite();
      document.getElementById('player-a-input').disabled = playerASubmitted;
      document.getElementById('btn-submit-a').disabled = playerASubmitted;
      runAnswerTimer();
      break;
    case 'answer_reveal':
      showPhase('answer-reveal');
      stopTimers();
      displayReveal();
      break;
    case 'game_over':
      showPhase('game-over');
      stopTimers();
      displayGameOver();
      break;
    default:
      console.warn('[applyPhase] unknown phase:', phase);
      showPhase('initial');
      break;
  }
}

// ── UI Helpers ─────────────────────────────────────────
function isCorrect(answer, topic) {
  const ans = (answer || '').trim();
  if (!ans || !topic) return false;
  return topic.split(',').map(t => t.trim()).includes(ans);
}

function showPhase(id) {
  document.querySelectorAll('.phase-screen').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('phase-' + id);
  if (el) el.classList.add('active');
}

function updateStatusBar() {
  if (!gameState) return;
  const n = gameState.topicNumber || 0;
  const r = gameState.round || 1;
  let topicText = n > 0 ? `お題 ${n} / ${CONFIG.totalTopics}` : '準備中';
  if (n > 0 && r > 1) topicText += `（${r}回目）`;
  document.getElementById('topic-num-disp').textContent = topicText;
  document.getElementById('score-a-disp').textContent = `${CONFIG.playerAName}: ${gameState.playerAScore || 0}点`;
  document.getElementById('score-b-disp').textContent = `${CONFIG.playerBName}: ${gameState.playerBScore || 0}点`;
}

function stopTimers() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
}

// ── Timer Management ───────────────────────────────────
function runDrawingTimer() {
  stopTimers();
  const tick = () => {
    if (!gameState || gameState.phase !== 'drawing') return;
    const rem = Math.ceil((gameState.drawingEndTime - Date.now()) / 1000);
    const el = document.getElementById('drawing-timer');
    if (el) { el.textContent = Math.max(0, rem); el.classList.toggle('urgent', rem <= 10); }
    if (rem <= 0) { stopTimers(); endDrawingPhase(); }
  };
  tick();
  timerInterval = setInterval(tick, 200);
}

function runAnswerTimer() {
  stopTimers();
  const tick = () => {
    if (!gameState || gameState.phase !== 'answering') return;
    const rem = Math.ceil((gameState.answerEndTime - Date.now()) / 1000);
    const el = document.getElementById('answer-timer');
    if (el) { el.textContent = Math.max(0, rem); el.classList.toggle('urgent', rem <= 10); }
    if (rem <= 0) { stopTimers(); endAnswerPhase(); }
  };
  tick();
  timerInterval = setInterval(tick, 200);
}

// ── Game Actions ───────────────────────────────────────
async function initGame() {
  const px = CONFIG.canvasSize * CONFIG.canvasSize;
  await db.collection('game').doc('session').set({
    phase: 'waiting',
    topicNumber: 0, round: 1, currentTopic: '',
    compositePixels: '0'.repeat(px), greyPixels: '0'.repeat(px),
    drawingEndTime: 0, answerEndTime: 0,
    playerAAnswer: '', playerBAnswer: '',
    playerASubmitted: false, playerBSubmitted: false,
    playerAScore: 0, playerBScore: 0,
    usedTopics: [], topicsList: [],
    winner: null, lastResult: null,
    gameHistory: [],
  });
  showPhase('waiting');
}

async function loadTopics() {
  if (topicsCache) return topicsCache;
  const res = await fetch(CONFIG.topicsFile + '?nc=' + Date.now());
  const text = await res.text();
  const topics = text.split('\n').map(t => t.trim()).filter(Boolean);
  for (let i = topics.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [topics[i], topics[j]] = [topics[j], topics[i]];
  }
  topicsCache = topics;
  return topics;
}

async function nextTopic() {
  const btn = document.getElementById('btn-next-topic');
  btn.disabled = true;
  try {
    let list = gameState?.topicsList;
    if (!list || list.length === 0) list = await loadTopics();

    const used = gameState?.usedTopics || [];
    const available = list.filter(t => !used.includes(t));
    if (!available.length) { alert('お題がなくなりました！'); btn.disabled = false; return; }

    const topic = available[0];
    const num = (gameState?.topicNumber || 0) + 1;
    const px = CONFIG.canvasSize * CONFIG.canvasSize;

    await clearParticipants();
    // まずpreparingフェーズへ
    await db.collection('game').doc('session').update({
      phase: 'preparing',
      topicNumber: num, round: 1,
      currentTopic: topic,
      compositePixels: '0'.repeat(px),
      greyPixels: '0'.repeat(px),
      prepareStartedAt: Date.now(),
      drawingEndTime: 0,
      answerEndTime: 0,
      playerAAnswer: '', playerBAnswer: '',
      playerASubmitted: false, playerBSubmitted: false,
      winner: null, lastResult: null,
      usedTopics: [...used, topic],
      topicsList: list,
    });
    playerASubmitted = false;
  } catch (e) { console.error(e); alert('エラー: ' + e.message); }
  btn.disabled = false;
}

function syncPrepareTimer() {
  stopTimers();
  let transitioned = false;
  timerInterval = setInterval(async () => {
    if (!gameState || gameState.phase !== 'preparing') { stopTimers(); return; }
    const startedAt = gameState.prepareStartedAt || Date.now();
    const elapsed = Math.floor((Date.now() - startedAt) / 1000);
    const rem = Math.max(0, CONFIG.prepareTime - elapsed);
    const el = document.getElementById('prepare-timer');
    if (el) el.textContent = rem;
    if (rem <= 0 && !transitioned) {
      transitioned = true;
      stopTimers();
      await db.collection('game').doc('session').update({
        phase: 'drawing',
        drawingEndTime: Date.now() + CONFIG.drawingTime * 1000,
      });
    }
  }, 200);
}

async function clearParticipants() {
  const snap = await db.collection('participants').get();
  if (snap.empty) return;
  const batch = db.batch();
  snap.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

function endDrawingPhase() {
  if (!gameState || gameState.phase !== 'drawing') return;
  db.collection('game').doc('session').update({ phase: 'drawing_ended' });
}

async function startCountdown() {
  // participant側のforceSave()完了を待つ（drawing_ended → forceSave に最大1秒かかる）
  await new Promise(r => setTimeout(r, 2000));
  const { composite, participantCount } = await computeOrComposite();
  await db.collection('game').doc('session').update({
    phase: 'countdown',
    compositePixels: composite,
    countdownStartedAt: Date.now(),
    participantCount: participantCount,
  });

  let count = CONFIG.countdownSeconds;
  const el = document.getElementById('countdown-number');
  if (el) el.textContent = count;

  countdownInterval = setInterval(async () => {
    count--;
    const el = document.getElementById('countdown-number');
    if (el) el.textContent = Math.max(0, count);
    if (count <= 0) {
      clearInterval(countdownInterval);
      countdownInterval = null;
      await db.collection('game').doc('session').update({
        phase: 'answering',
        answerEndTime: Date.now() + CONFIG.answerTime * 1000,
        playerAAnswer: '', playerBAnswer: '',
        playerASubmitted: false, playerBSubmitted: false,
      });
      playerASubmitted = false;
    }
  }, 1000);
}

async function computeOrComposite() {
  const roundKey = `${gameState.topicNumber}-${gameState.round}`;
  const px = CONFIG.canvasSize * CONFIG.canvasSize;
  const snap = await db.collection('participants')
    .where('roundKey', '==', roundKey).get();

  if (snap.empty) return { composite: '0'.repeat(px), participantCount: 0 };

  const result = new Array(px).fill(0);
  snap.forEach(doc => {
    const pix = doc.data().pixels || '';
    for (let i = 0; i < px; i++) {
      if (pix[i] === '1') result[i] = 1;
    }
  });
  return { composite: result.join(''), participantCount: snap.size };
}

function renderComposite() {
  if (!gameState) return;
  const canvas = document.getElementById('composite-canvas');
  const size = CONFIG.canvasSize;
  const scale = CONFIG.playerScale;
  canvas.width = size * scale;
  canvas.height = size * scale;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const grey = gameState.greyPixels || '';
  const comp = gameState.compositePixels || '';
  for (let i = 0; i < size * size; i++) {
    const x = (i % size) * scale, y = Math.floor(i / size) * scale;
    if (grey[i] === '1') { ctx.fillStyle = '#ccc'; ctx.fillRect(x, y, scale, scale); }
  }
  for (let i = 0; i < size * size; i++) {
    const x = (i % size) * scale, y = Math.floor(i / size) * scale;
    if (comp[i] === '1') { ctx.fillStyle = '#111'; ctx.fillRect(x, y, scale, scale); }
  }
}

function submitAnswerA() {
  if (playerASubmitted) return;
  const val = document.getElementById('player-a-input').value.trim();
  playerASubmitted = true;
  document.getElementById('player-a-input').disabled = true;
  document.getElementById('btn-submit-a').disabled = true;
  document.getElementById('submit-status-a').textContent = '✅ 回答を送信しました';
  db.collection('game').doc('session').update({ playerAAnswer: val, playerASubmitted: true });
}

async function endAnswerPhase() {
  if (!gameState || gameState.phase !== 'answering') return;
  if (!playerASubmitted) {
    const val = (document.getElementById('player-a-input')?.value || '').trim();
    await db.collection('game').doc('session').update({ playerAAnswer: val, playerASubmitted: true });
    playerASubmitted = true;
  }
  // Wait briefly for B's answer then evaluate
  await new Promise(r => setTimeout(r, 600));
  const snap = await db.collection('game').doc('session').get();
  const state = snap.data();
  if (!state || state.phase !== 'answering') return; // already handled

  const topic = state.currentTopic;
  const ansA = (state.playerAAnswer || '').trim();
  const ansB = (state.playerBAnswer || '').trim();
  const aOk = isCorrect(ansA, topic);
  const bOk = isCorrect(ansB, topic);
  const round = state.round || 1;
  const n = state.participantCount || 0;
  const pts = Math.max(1, n - round);
  let sA = state.playerAScore || 0, sB = state.playerBScore || 0;
  let result = 'none';
  if (aOk) { sA += pts; result = 'A'; }
  if (bOk) { sB += pts; result = aOk ? 'both' : 'B'; }

  await db.collection('game').doc('session').update({
    phase: 'answer_reveal',
    playerAScore: sA, playerBScore: sB,
    lastResult: result,
  });
}

function displayReveal() {
  if (!gameState) return;
  const topic = gameState.currentTopic;
  const ansA = gameState.playerAAnswer || '（未回答）';
  const ansB = gameState.playerBAnswer || '（未回答）';
  const aOk = isCorrect(ansA, topic), bOk = isCorrect(ansB, topic);

  // プレイヤー名を反映
  document.getElementById('label-a').textContent = `${CONFIG.playerAName} の回答`;
  document.getElementById('label-b').textContent = `${CONFIG.playerBName} の回答`;

  // 合成イラストを描画
  const canvas = document.getElementById('reveal-canvas');
  const size = CONFIG.canvasSize, scale = CONFIG.playerScale;
  canvas.width = size * scale; canvas.height = size * scale;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  const grey = gameState.greyPixels || '';
  const comp = gameState.compositePixels || '';
  for (let i = 0; i < size * size; i++) {
    const x = (i % size) * scale, y = Math.floor(i / size) * scale;
    if (grey[i] === '1') { ctx.fillStyle = '#ccc'; ctx.fillRect(x, y, scale, scale); }
  }
  for (let i = 0; i < size * size; i++) {
    const x = (i % size) * scale, y = Math.floor(i / size) * scale;
    if (comp[i] === '1') { ctx.fillStyle = '#111'; ctx.fillRect(x, y, scale, scale); }
  }

  const someCorrect = aOk || bOk;
  document.getElementById('reveal-topic-box').style.display = someCorrect ? '' : 'none';
  document.getElementById('reveal-topic').textContent = someCorrect ? topic.split(',')[0] : '';
  const rA = document.getElementById('result-a');
  const rB = document.getElementById('result-b');
  rA.textContent = ansA;
  rB.textContent = ansB;
  rA.className = 'answer-text ' + (aOk ? 'correct-text' : 'wrong-text');
  rB.className = 'answer-text ' + (bOk ? 'correct-text' : 'wrong-text');
  document.getElementById('result-row-a').className = 'result-row' + (aOk ? ' correct' : '');
  document.getElementById('result-row-b').className = 'result-row' + (bOk ? ' correct' : '');

  const isLast = gameState.topicNumber >= CONFIG.totalTopics;
  const round = gameState.round || 1;
  const maxRoundsReached = round >= (CONFIG.maxRounds || 5);

  document.getElementById('btn-next-after-reveal').style.display = (someCorrect && !isLast) ? '' : 'none';
  document.getElementById('btn-gameover').style.display = (someCorrect && isLast) ? '' : 'none';
  // 不正解でもmaxRoundsに達したら次のお題/ゲームオーバーへ
  if (!someCorrect) {
    if (maxRoundsReached) {
      document.getElementById('btn-retry').style.display = 'none';
      document.getElementById('btn-next-after-reveal').style.display = isLast ? 'none' : '';
      document.getElementById('btn-gameover').style.display = isLast ? '' : 'none';
    } else {
      document.getElementById('btn-retry').style.display = '';
    }
  }
}

async function proceedAfterReveal() {
  // ゲーム履歴に現在のお題と合成イラストを記録
  const history = gameState.gameHistory || [];
  history.push({
    topic: gameState.currentTopic,
    composite: gameState.compositePixels || '',
  });
  await db.collection('game').doc('session').update({ phase: 'waiting', gameHistory: history });
}

async function retryTopic() {
  if (!gameState) return;
  const px = CONFIG.canvasSize * CONFIG.canvasSize;
  await clearParticipants();
  // greyPixels: 前回の合成(comp)とグレー(grey)のOR — ただし描画時にグレー表示のみ、合成計算には含めない
  // 合成イラストのグレー部分は白(0)として扱うため、新たなgreyPixelsは前回compositePixelsのみ
  const newGrey = gameState.compositePixels || '0'.repeat(px);
  await db.collection('game').doc('session').update({
    phase: 'preparing',
    round: (gameState.round || 1) + 1,
    greyPixels: newGrey,
    compositePixels: '0'.repeat(px),
    prepareStartedAt: Date.now(),
    drawingEndTime: 0,
    playerAAnswer: '', playerBAnswer: '',
    playerASubmitted: false, playerBSubmitted: false,
    winner: null, lastResult: null,
  });
  playerASubmitted = false;
}

async function goToGameOver() {
  if (!gameState) return;
  const sA = gameState.playerAScore || 0, sB = gameState.playerBScore || 0;
  const w = sA > sB ? 'A' : sB > sA ? 'B' : 'draw';
  // 最後のお題の履歴も追加
  const history = gameState.gameHistory || [];
  history.push({
    topic: gameState.currentTopic,
    composite: gameState.compositePixels || '',
  });
  await db.collection('game').doc('session').update({ phase: 'game_over', winner: w, gameHistory: history });
}

function displayGameOver() {
  if (!gameState) return;
  const sA = gameState.playerAScore || 0, sB = gameState.playerBScore || 0;
  document.getElementById('final-a').textContent = `${sA}点`;
  document.getElementById('final-b').textContent = `${sB}点`;
  document.getElementById('final-label-a').textContent = CONFIG.playerAName;
  document.getElementById('final-label-b').textContent = CONFIG.playerBName;
  const box = document.getElementById('winner-box');
  const w = gameState.winner;
  if (w === 'draw') {
    box.innerHTML = '<div class="wlabel">結果</div><div class="wname">引き分け！</div>';
  } else {
    const col = w === 'A' ? '#4a9eff' : '#ff4a4a';
    const name = w === 'A' ? CONFIG.playerAName : CONFIG.playerBName;
    box.innerHTML = `<div class="wlabel">🏆 勝者</div><div class="wname" style="color:${col}">${name}</div>`;
  }

  // 感想戦：gameHistoryからイラストを表示
  const history = gameState.gameHistory || [];
  const container = document.getElementById('game-history');
  container.innerHTML = '';
  history.forEach((item, idx) => {
    const topicLabel = (item.topic || '').split(',')[0];
    const div = document.createElement('div');
    div.style.cssText = 'text-align:center;';
    const cvs = document.createElement('canvas');
    const size = CONFIG.canvasSize, scale = 5;
    cvs.width = size * scale; cvs.height = size * scale;
    cvs.style.cssText = `display:block;image-rendering:pixelated;border:1px solid #333;border-radius:4px;`;
    const ctx = cvs.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, cvs.width, cvs.height);
    const comp = item.composite || '';
    for (let i = 0; i < size * size; i++) {
      if (comp[i] === '1') {
        const x = (i % size) * scale, y = Math.floor(i / size) * scale;
        ctx.fillStyle = '#111'; ctx.fillRect(x, y, scale, scale);
      }
    }
    const label = document.createElement('div');
    label.style.cssText = 'font-size:0.75rem;color:#aaa;margin-top:4px;';
    label.textContent = `${idx + 1}. ${topicLabel}`;
    div.appendChild(cvs);
    div.appendChild(label);
    container.appendChild(div);
  });
}

async function resetGame() {
  if (!confirm('ゲームをリセットしますか？')) return;
  stopTimers();
  await clearParticipants();
  topicsCache = null;
  playerASubmitted = false;
  await initGame();
}
</script>
